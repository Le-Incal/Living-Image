<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Image - Crossfade Test Harness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,200;1,9..40,300&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface-raised: #1c1c1c;
    --border: #252525;
    --border-active: #3a3a3a;
    --text: #e8e4df;
    --text-secondary: #8a8580;
    --text-dim: #5a5652;
    --accent: #c9a882;
    --accent-subtle: rgba(201, 168, 130, 0.08);
    --accent-glow: rgba(201, 168, 130, 0.35);
    --success: #6bcf7f;
    --error: #cf6b6b;
    --warning: #cfb96b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Upload Screen ── */
  #upload-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
    transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.7s;
  }
  #upload-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(140, 90, 45, 0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  #upload-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .upload-zone {
    width: 560px;
    padding: 64px 56px;
    text-align: center;
    cursor: pointer;
    position: relative;
    border-radius: 16px;
    border: 1px solid transparent;
    transition: border-color 0.4s ease, background 0.4s ease;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--border);
    background: var(--accent-subtle);
  }
  .upload-zone h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 300;
    font-size: 36px;
    letter-spacing: -0.8px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .upload-zone p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    font-weight: 300;
  }

  .upload-config {
    margin-top: 32px;
  }

  .browse-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--text);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2px;
    transition: all 0.3s ease;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .browse-cta:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-subtle);
  }
  .browse-cta svg { width: 14px; height: 14px; opacity: 0.6; }

  .upload-format-note {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    font-weight: 300;
  }

  input[type="file"] { display: none; }

  /* ── Main Viewer ── */
  #viewer {
    flex: 1;
    position: relative;
    display: none;
    overflow: hidden;
  }
  #viewer.active { display: flex; flex-direction: column; }

  /* ── Image Stack ── */
  .image-stack {
    flex: 1;
    position: relative;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .image-stack img {
    position: absolute;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: none; /* We control opacity via JS for smooth blending */
    pointer-events: none;
    image-rendering: high-quality;
  }

  /* ── Progress Overlay ── */
  #progress-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13, 13, 13, 0.92);
    z-index: 50;
    transition: opacity 0.5s;
  }
  #progress-overlay.hidden { opacity: 0; pointer-events: none; }

  .progress-content {
    text-align: center;
    max-width: 400px;
  }
  .progress-title {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 24px;
    font-weight: 300;
    margin-bottom: 24px;
    color: var(--text);
  }
  .progress-bar-track {
    width: 320px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 auto 16px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-status {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* ── Controls Panel ── */
  #controls {
    position: relative;
    padding: 0 40px 28px;
    z-index: 10;
    display: none;
  }
  #controls.active { display: block; }

  .controls-backdrop {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(to top, rgba(13,13,13,0.97) 0%, rgba(13,13,13,0.8) 50%, rgba(13,13,13,0.4) 75%, transparent 100%);
    pointer-events: none;
  }

  .controls-inner {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px 10px;
  }

  .time-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .time-label {
    font-size: 6px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .time-value-group { display: flex; align-items: baseline; gap: 3px; }
  .time-value {
    font-size: 16px;
    font-weight: 200;
    letter-spacing: -0.8px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .time-period {
    font-size: 6px;
    color: var(--text-dim);
    font-weight: 300;
    margin-left: 2px;
  }

  .controls-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .meta-badge {
    font-size: 11px;
    color: var(--text-dim);
    padding: 3px 10px;
    background: var(--surface-raised);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .slider-track { height: 32px; display: flex; align-items: center; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px;
    background: var(--border);
    border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: grab;
    box-shadow: 0 0 24px var(--accent-glow), 0 0 6px rgba(201,168,130,0.2);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 32px var(--accent-glow);
  }
  input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: grab; border: none;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .time-markers {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    padding: 0 2px;
  }
  .time-marker {
    font-size: 9px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.3px;
    opacity: 0.6;
  }

  .controls-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .btn-reset, .btn-export-trigger {
    font-size: 12px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-reset:hover, .btn-export-trigger:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-export-trigger {
    background: var(--accent-subtle);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-export-trigger:hover {
    background: rgba(201, 168, 130, 0.18);
  }

  .export-wrap {
    position: relative;
    display: inline-block;
  }
  .export-menu {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 4px;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 0;
    z-index: 20;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .export-wrap.open .export-menu {
    display: block;
  }
  .export-option {
    display: block;
    width: 100%;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-align: left;
    transition: background 0.2s;
  }
  .export-option:hover {
    background: var(--accent-subtle);
    color: var(--accent);
  }

  .btn-play {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .btn-play:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-subtle);
  }
  .btn-play svg {
    width: 14px;
    height: 14px;
  }
  .btn-play.playing {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-prompts {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }
  .btn-prompts:hover { color: var(--text-secondary); }

  /* ── Prompt Preview Modal ── */
  #prompt-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }
  #prompt-modal.active { display: flex; }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 700px;
    max-height: 80vh;
    overflow-y: auto;
    width: 90%;
  }
  .modal-content h2 {
    font-family: 'Newsreader', Georgia, serif;
    font-weight: 300;
    font-size: 22px;
    margin-bottom: 20px;
  }
  .modal-content pre {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg);
    padding: 16px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    line-height: 1.6;
  }
  .modal-content .prompt-hour {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal-close {
    float: right;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
</style>
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <div class="upload-zone" id="drop-zone">
    <h1>Living Image</h1>
    <p>Upload an architectural render to generate</p>

    <div class="upload-config">
      <div class="browse-cta" id="browse-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Upload image
      </div>
    </div>

    <p class="upload-format-note">PNG, JPG up to 20MB</p>
    <input type="file" id="file-input" accept="image/*">
  </div>
</div>

<!-- Main Viewer -->
<div id="viewer">
  <!-- Image Stack -->
  <div class="image-stack" id="image-stack">
    <!-- 12 images will be injected here -->
  </div>

  <!-- Progress Overlay -->
  <div id="progress-overlay">
    <div class="progress-content">
      <div class="progress-title">Generating Living Image.</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-status" id="progress-status">Preparing your living image</div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="controls-backdrop"></div>
    <div class="controls-inner">
      <div class="time-header">
        <span class="time-label">Time of Day</span>
        <div class="controls-meta">
          <button type="button" class="btn-play" id="btn-play" title="Play timelapse" aria-label="Play timelapse">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <div class="time-value-group">
            <span class="time-value" id="time-display">12:00</span>
            <span class="time-period" id="time-period">PM</span>
          </div>
        </div>
      </div>

      <div class="slider-track">
        <input type="range" id="time-slider" min="0" max="1000" value="500">
      </div>

      <div class="time-markers">
        <span class="time-marker">8 AM</span>
        <span class="time-marker">10</span>
        <span class="time-marker">12</span>
        <span class="time-marker">2 PM</span>
        <span class="time-marker">4</span>
        <span class="time-marker">6</span>
        <span class="time-marker">8 PM</span>
      </div>

      <div class="controls-footer">
        <button class="btn-reset" id="btn-reset">New image</button>
        <div class="export-wrap" id="export-wrap">
          <button type="button" class="btn-export-trigger" id="export-trigger">Export</button>
          <div class="export-menu" id="export-menu">
            <button type="button" class="export-option" data-export="upscale">Upscale and download</button>
            <button type="button" class="export-option" data-export="gif">Download GIF Sequence</button>
          </div>
        </div>
        <button class="btn-prompts" id="btn-prompts">View prompts</button>
      </div>
    </div>
  </div>
</div>

<!-- Prompt Preview Modal -->
<div id="prompt-modal">
  <div class="modal-content">
    <button class="modal-close" id="modal-close">Close</button>
    <h2>Prompt Preview</h2>
    <div id="prompt-list"></div>
  </div>
</div>

<script>
// ─── Helpers ───
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ─── State ───
const state = {
  imageFile: null,
  variants: [],
  jobId: null,
  generating: false,
  playing: false,
  playAnimationId: null,
};

// ─── DOM refs ───
const $uploadScreen = document.getElementById('upload-screen');
const $dropZone = document.getElementById('drop-zone');
const $browseBtn = document.getElementById('browse-btn');
const $fileInput = document.getElementById('file-input');
const $viewer = document.getElementById('viewer');
const $imageStack = document.getElementById('image-stack');
const $progressOverlay = document.getElementById('progress-overlay');
const $progressFill = document.getElementById('progress-fill');
const $progressStatus = document.getElementById('progress-status');
const $controls = document.getElementById('controls');
const $timeSlider = document.getElementById('time-slider');
const $timeDisplay = document.getElementById('time-display');
const $timePeriod = document.getElementById('time-period');
const $btnReset = document.getElementById('btn-reset');
const $exportWrap = document.getElementById('export-wrap');
const $exportTrigger = document.getElementById('export-trigger');
const $exportMenu = document.getElementById('export-menu');
const $btnPlay = document.getElementById('btn-play');
const $playIcon = document.getElementById('play-icon');
const $pauseIcon = document.getElementById('pause-icon');
const $btnPrompts = document.getElementById('btn-prompts');
const $promptModal = document.getElementById('prompt-modal');
const $promptList = document.getElementById('prompt-list');
const $modalClose = document.getElementById('modal-close');

// ─── Upload handling ───
$browseBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  $fileInput.click();
});
$dropZone.addEventListener('click', () => $fileInput.click());
$dropZone.addEventListener('dragover', e => { e.preventDefault(); $dropZone.classList.add('dragover'); });
$dropZone.addEventListener('dragleave', () => $dropZone.classList.remove('dragover'));
$dropZone.addEventListener('drop', e => {
  e.preventDefault();
  $dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files;
  if (f.length > 0 && f[0].type.startsWith('image/')) handleUpload(f[0]);
});
$fileInput.addEventListener('change', e => {
  if (e.target.files.length > 0) handleUpload(e.target.files[0]);
});

async function handleUpload(file) {
  state.imageFile = file;
  $uploadScreen.classList.add('hidden');
  $viewer.classList.add('active');
  $progressOverlay.classList.remove('hidden');
  await generateVariants(file);
}

async function generateVariants(file) {
  state.generating = true;
  $progressStatus.textContent = 'Uploading image and starting generation...';
  $progressFill.style.width = '5%';

  const formData = new FormData();
  formData.append('image', file);
  formData.append('model_id', 'gemini');

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      body: formData,
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || 'Generation failed');
    }

    const data = await resp.json();
    state.jobId = data.job_id;
    state.variants = data.variants;

    let loaded = 0;
    const totalValid = data.variants.filter(v => v.status === 'success').length;
    $imageStack.innerHTML = '';

    for (let i = 0; i < data.variants.length; i++) {
      const v = data.variants[i];
      v.index = i;
      if (v.status === 'success') {
        const img = document.createElement('img');
        img.src = v.image_url;
        img.dataset.index = i;
        img.dataset.hour = v.hour;
        img.alt = v.label;

        img.onload = () => {
          loaded++;
          const pct = 10 + (loaded / totalValid) * 85;
          $progressFill.style.width = `${pct}%`;
          $progressStatus.textContent = `Loading images: ${loaded}/${totalValid}`;
          if (loaded === totalValid) finishGeneration();
        };

        $imageStack.appendChild(img);
        v.img_element = img;
      }
    }

    $progressFill.style.width = '95%';
    $progressStatus.textContent = `Generated ${data.success}/${data.total} frames. Loading...`;

    if (totalValid === 0) {
      const firstError = data.variants.find(v => v.error);
      const errDetail = firstError ? firstError.error : 'Unknown error';
      $progressStatus.innerHTML = 'All generations failed. Check API keys and try again.<br><span style="color: var(--error); font-size: 12px; display: block; margin-top: 8px; max-width: 360px; margin-left: auto; margin-right: auto;">' + escapeHtml(errDetail) + '</span>';
      state.generating = false;
    }

  } catch (e) {
    console.error('Generation error:', e);
    $progressStatus.textContent = `Error: ${e.message}`;
    state.generating = false;
  }
}

function finishGeneration() {
  state.generating = false;
  $progressFill.style.width = '100%';
  $progressStatus.textContent = 'Complete!';

  setTimeout(() => {
    $progressOverlay.classList.add('hidden');
    $controls.classList.add('active');
    updateSlider();
  }, 600);
}

// ─── Slider and crossfade (unchanged). Snap to nearest hour on release only. ───
function sliderToTime(value) {
  return 8 + (value / 1000) * 12;
}

function timeToSliderValue(hour) {
  if (hour <= 8) return 0;
  if (hour >= 20) return 1000;
  return Math.round(((hour - 8) / 12) * 1000);
}

function getSnappedHour() {
  const val = parseInt($timeSlider.value);
  const hourFloat = sliderToTime(val);
  return Math.max(8, Math.min(20, Math.round(hourFloat)));
}

function formatTime(hourFloat) {
  const h24 = hourFloat;
  const h12 = h24 % 12 || 12;
  const m = Math.round((h24 % 1) * 60);
  return {
    time: `${Math.floor(h12)}:${m.toString().padStart(2, '0')}`,
    period: h24 >= 12 ? 'PM' : 'AM',
  };
}

function updateSlider() {
  const val = parseInt($timeSlider.value);
  const hourFloat = sliderToTime(val);
  const fmt = formatTime(hourFloat);
  $timeDisplay.textContent = fmt.time;
  $timePeriod.textContent = fmt.period;

  const validVariants = state.variants.filter(v => v.status === 'success' && v.img_element);
  if (validVariants.length === 0) return;

  let lower = validVariants[0];
  let upper = validVariants[validVariants.length - 1];
  for (let i = 0; i < validVariants.length - 1; i++) {
    if (validVariants[i].hour <= hourFloat && validVariants[i + 1].hour > hourFloat) {
      lower = validVariants[i];
      upper = validVariants[i + 1];
      break;
    }
  }
  if (hourFloat >= validVariants[validVariants.length - 1].hour) {
    lower = validVariants[validVariants.length - 1];
    upper = lower;
  }

  let blend = 0;
  if (lower !== upper) {
    blend = (hourFloat - lower.hour) / (upper.hour - lower.hour);
    blend = Math.max(0, Math.min(1, blend));
  }

  for (const v of validVariants) {
    if (!v.img_element) continue;
    if (v === lower && v === upper) {
      v.img_element.style.opacity = 1;
    } else if (v === lower) {
      v.img_element.style.opacity = 1;
    } else if (v === upper) {
      v.img_element.style.opacity = blend;
    } else {
      v.img_element.style.opacity = 0;
    }
  }
}

function snapSliderToNearestHour() {
  const snappedHour = getSnappedHour();
  $timeSlider.value = timeToSliderValue(snappedHour);
  updateSlider();
}

$timeSlider.addEventListener('input', updateSlider);
$timeSlider.addEventListener('change', () => {
  snapSliderToNearestHour();
  if (state.playing) stopTimelapse();
});

const TIMELAPSE_DURATION_MS = 15000; // 8am to 8pm in 15 seconds

function runTimelapse(timestamp) {
  if (!state.playing) return;
  if (!state.playStartTime) state.playStartTime = timestamp;
  const elapsed = timestamp - state.playStartTime;
  const progress = (elapsed % TIMELAPSE_DURATION_MS) / TIMELAPSE_DURATION_MS; // 0..1, loops
  const val = Math.round(progress * 1000);
  $timeSlider.value = val;
  updateSlider();
  state.playAnimationId = requestAnimationFrame(runTimelapse);
}

function startTimelapse() {
  if (state.variants.filter(v => v.status === 'success' && v.img_element).length === 0) return;
  state.playing = true;
  state.playStartTime = null;
  $btnPlay.classList.add('playing');
  $playIcon.style.display = 'none';
  $pauseIcon.style.display = 'block';
  state.playAnimationId = requestAnimationFrame(runTimelapse);
}

function stopTimelapse() {
  state.playing = false;
  if (state.playAnimationId != null) {
    cancelAnimationFrame(state.playAnimationId);
    state.playAnimationId = null;
  }
  $btnPlay.classList.remove('playing');
  $playIcon.style.display = 'block';
  $pauseIcon.style.display = 'none';
}

$btnPlay.addEventListener('click', () => {
  if (state.playing) stopTimelapse();
  else startTimelapse();
});

// ─── Current frame for download: nearest hour (snapped position) ───
function getCurrentFrameVariant() {
  const validVariants = state.variants.filter(v => v.status === 'success' && v.image_url);
  if (validVariants.length === 0) return null;
  const snappedHour = getSnappedHour();
  return validVariants.find(v => v.hour === snappedHour) || validVariants[0];
}

function getFilenameFromImageUrl(url) {
  if (!url) return null;
  const parts = url.split('/');
  return parts[parts.length - 1] || null;
}

// ─── Export dropdown ───
$exportTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  $exportWrap.classList.toggle('open');
});
document.addEventListener('click', () => $exportWrap.classList.remove('open'));
$exportMenu.addEventListener('click', (e) => e.stopPropagation());

async function doUpscaleAndDownload() {
  const variant = getCurrentFrameVariant();
  if (!variant || !state.jobId) {
    alert('No frame selected. Move the time slider to choose a frame, then try again.');
    return;
  }
  const filename = getFilenameFromImageUrl(variant.image_url);
  if (!filename) return;
  const upscaleUrl = `/api/images/${state.jobId}/${filename}/upscale`;
  try {
    $exportTrigger.disabled = true;
    $exportTrigger.textContent = 'Preparing…';
    const resp = await fetch(upscaleUrl);
    if (!resp.ok) throw new Error('Upscale failed');
    const blob = await resp.blob();
    const disposition = resp.headers.get('Content-Disposition');
    const match = disposition && disposition.match(/filename="?([^";]+)"?/);
    const name = (match && match[1]) || filename.replace('.png', '_2x.png');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    console.error(e);
    alert('Download failed. Please try again.');
  } finally {
    $exportTrigger.disabled = false;
    $exportTrigger.textContent = 'Export';
  }
}

async function doDownloadGifSequence() {
  if (!state.jobId) {
    alert('No job. Generate an image first.');
    return;
  }
  try {
    $exportWrap.classList.remove('open');
    $exportTrigger.disabled = true;
    $exportTrigger.textContent = 'Creating…';
    const resp = await fetch(`/api/images/${state.jobId}/animation.gif`);
    if (!resp.ok) throw new Error('GIF failed');
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `living-image-${state.jobId}.gif`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    console.error(e);
    alert('Download failed. Please try again.');
  } finally {
    $exportTrigger.disabled = false;
    $exportTrigger.textContent = 'Export';
  }
}

$exportMenu.querySelector('[data-export="upscale"]').addEventListener('click', () => {
  $exportWrap.classList.remove('open');
  doUpscaleAndDownload();
});
$exportMenu.querySelector('[data-export="gif"]').addEventListener('click', () => {
  doDownloadGifSequence();
});

// ─── Reset ───
$btnReset.addEventListener('click', () => {
  state.variants = [];
  state.jobId = null;
  state.imageFile = null;
  $imageStack.innerHTML = '';
  $viewer.classList.remove('active');
  $controls.classList.remove('active');
  $progressOverlay.classList.remove('hidden');
  $uploadScreen.classList.remove('hidden');
  $fileInput.value = '';
});

// ─── Prompt preview ───
$btnPrompts.addEventListener('click', async () => {
  try {
    const resp = await fetch('/api/prompt-preview');
    const prompts = await resp.json();
    $promptList.innerHTML = '';
    prompts.forEach(p => {
      const div = document.createElement('div');
      div.innerHTML = `<div class="prompt-hour">${p.label} (hour ${p.hour})</div><pre>${p.prompt}</pre>`;
      $promptList.appendChild(div);
    });
    $promptModal.classList.add('active');
  } catch (e) {
    console.error('Failed to load prompts:', e);
  }
});

$modalClose.addEventListener('click', () => $promptModal.classList.remove('active'));
$promptModal.addEventListener('click', e => {
  if (e.target === $promptModal) $promptModal.classList.remove('active');
});

// ─── Boot ───
// (no model loading; single model only)
</script>
</body>
